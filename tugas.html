<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Belle Assiette · mewah lengkap</title>
  <!-- Fonts mewah -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at top, #1f1a17 0%, #0b0a09 100%);
      font-family: 'Poppins', sans-serif;
      color: #f5eee6;
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* container utama */
    .container {
      max-width: 1400px;
      width: 100%;
      background: rgba(20, 15, 12, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 3rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.15) inset;
    }

    /* header dengan login & keranjang */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .title-group h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 700;
      background: linear-gradient(135deg, #f5e7c8 0%, #d4af37 70%, #f5e7c8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .title-group p {
      font-size: 1rem;
      font-weight: 300;
      color: #c9b9a5;
      letter-spacing: 2px;
      border-top: 1px solid rgba(212, 175, 55, 0.4);
      border-bottom: 1px solid rgba(212, 175, 55, 0.4);
      display: inline-block;
      padding: 0.4rem 1.5rem;
      margin-top: 0.5rem;
    }

    /* actions: login + cart */
    .actions {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .login-btn, .logout-btn {
      background: rgba(30, 25, 20, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid #d4af37;
      border-radius: 3rem;
      padding: 0.6rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f5e7c8;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    .login-btn i, .logout-btn i {
      color: #d4af37;
      font-size: 1.2rem;
    }

    .login-btn:hover, .logout-btn:hover {
      background: #4a3f35;
      border-color: #f5e7c8;
      box-shadow: 0 0 15px #d4af37;
    }

    .user-greeting {
      font-size: 1rem;
      color: #d4af37;
      font-weight: 500;
      letter-spacing: 0.5px;
      background: rgba(0,0,0,0.3);
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      border-left: 2px solid #d4af37;
    }

    .cart-icon {
      background: rgba(30, 25, 20, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid #d4af37;
      border-radius: 3rem;
      padding: 0.6rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: #f5e7c8;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .cart-icon i {
      font-size: 1.5rem;
      color: #d4af37;
    }

    .cart-details {
      display: flex;
      flex-direction: column;
      font-size: 0.9rem;
    }

    .cart-details span:first-child {
      font-weight: 300;
      color: #bcb0a0;
    }

    .cart-details .cart-total {
      font-weight: 600;
      color: #d4af37;
      font-size: 1.1rem;
    }

    /* search */
    .search-section {
      margin: 2rem 0 2.5rem;
      display: flex;
      justify-content: center;
    }

    .search-wrapper {
      position: relative;
      width: min(100%, 500px);
    }

    .search-wrapper i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #d4af37;
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .search-input {
      width: 100%;
      background: rgba(25, 20, 17, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 4rem;
      padding: 1.2rem 1.2rem 1.2rem 3.5rem;
      font-size: 1.1rem;
      color: #f5e7c8;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
    }

    .search-input::placeholder {
      color: #9b8b78;
      font-style: italic;
    }

    /* grid makanan */
    .food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2rem;
      margin: 2rem 0 3rem;
    }

    .food-card {
      background: rgba(30, 25, 20, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 2.2rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 175, 55, 0.2) inset;
      display: flex;
      flex-direction: column;
    }

    .food-card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: rgba(212, 175, 55, 0.7);
      box-shadow: 0 40px 50px -15px #000000cc, 0 0 0 2px #d4af37 inset, 0 0 30px #d4af37;
    }

    .food-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-bottom: 2px solid #d4af37;
      transition: transform 0.6s ease;
    }

    .food-card:hover .food-img {
      transform: scale(1.05);
    }

    .food-info {
      padding: 1.8rem 1.5rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .food-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #f5e7c8;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .food-name i {
      color: #d4af37;
      font-size: 1.3rem;
      opacity: 0.8;
    }

    .food-desc {
      font-size: 0.95rem;
      color: #bcb0a0;
      margin-bottom: 1.2rem;
      line-height: 1.5;
      flex: 1;
    }

    .food-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed rgba(212, 175, 55, 0.4);
      padding-top: 1rem;
      margin-top: auto;
    }

    .food-price {
      font-size: 1.9rem;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      line-height: 1;
    }

    .food-price small {
      font-size: 1rem;
      font-weight: 300;
      color: #ab8e5a;
      margin-right: 2px;
    }

    .btn-order {
      background: transparent;
      border: 1.5px solid #d4af37;
      color: #d4af37;
      padding: 0.5rem 1.5rem;
      border-radius: 3rem;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 0.5px;
    }

    .btn-order i {
      margin-left: 6px;
      font-size: 0.8rem;
    }

    .food-card:hover .btn-order {
      background: #d4af37;
      color: #1a1512;
    }

    /* pagination */
    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }

    .pagination {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .page-btn, .prev-next {
      background: rgba(30, 25, 20, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(212, 175, 55, 0.4);
      color: #e5d9c9;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 12px rgba(0,0,0,0.4);
    }

    .prev-next {
      width: auto;
      padding: 0 1.8rem;
      border-radius: 40px;
      gap: 8px;
      font-size: 1rem;
    }

    .page-btn.active {
      background: #d4af37;
      color: #1f1a17;
      border-color: #f5e7c8;
      box-shadow: 0 0 20px #d4af37;
      font-weight: 600;
    }

    .page-btn:hover:not(.active), .prev-next:hover:not(.disabled) {
      background: #4a3f35;
      border-color: #d4af37;
      color: #f5e7c8;
      transform: scale(1.08);
    }

    .prev-next.disabled {
      opacity: 0.3;
      pointer-events: none;
      border-color: #5f5548;
    }

    /* notifikasi (toast) */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      background: rgba(10, 8, 6, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid #d4af37;
      border-left: 6px solid #d4af37;
      border-radius: 2rem;
      padding: 1rem 1.8rem;
      color: #f5e7c8;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px #d4af37;
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      animation: slideIn 0.4s forwards, fadeOut 0.4s 2.6s forwards;
      pointer-events: none;
      max-width: 350px;
    }

    .toast i {
      color: #d4af37;
      font-size: 1.4rem;
    }

    @keyframes slideIn {
      to { transform: translateX(0); }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(120%); }
    }

    /* ------- MODAL KERANJANG (SIDE PANEL) ------- */
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -500px;
      width: 100%;
      max-width: 450px;
      height: 100vh;
      background: rgba(18, 14, 12, 0.95);
      backdrop-filter: blur(20px);
      border-left: 2px solid #d4af37;
      box-shadow: -20px 0 50px rgba(0, 0, 0, 0.7);
      transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      color: #f5e7c8;
      padding: 2rem 1.5rem;
    }

    .cart-sidebar.open {
      right: 0;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d4af37;
      padding-bottom: 1.2rem;
      margin-bottom: 2rem;
    }

    .cart-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #d4af37;
    }

    .close-cart {
      background: transparent;
      border: none;
      color: #d4af37;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 1.5rem;
      padding: 1rem;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .cart-item-img {
      width: 70px;
      height: 70px;
      border-radius: 1rem;
      object-fit: cover;
      border: 1px solid #d4af37;
    }

    .cart-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cart-item-name {
      font-weight: 600;
      color: #f5e7c8;
    }

    .cart-item-price {
      color: #d4af37;
      font-size: 1.1rem;
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 5px;
    }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      background: rgba(0,0,0,0.4);
      border: 1px solid #d4af37;
      color: #d4af37;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }

    .qty-btn:hover {
      background: #d4af37;
      color: #1f1a17;
    }

    .cart-item-qty span {
      min-width: 20px;
      text-align: center;
    }

    .remove-item {
      background: transparent;
      border: none;
      color: #b1864b;
      cursor: pointer;
      font-size: 1.1rem;
      margin-left: auto;
    }

    .cart-footer {
      border-top: 1px solid #d4af37;
      padding-top: 1.5rem;
      margin-top: 2rem;
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.4rem;
      font-weight: 600;
      color: #d4af37;
      margin-bottom: 1.5rem;
    }

    .checkout-btn {
      background: #d4af37;
      border: none;
      width: 100%;
      padding: 1rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.2rem;
      color: #1a1512;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid #f5e7c8;
    }

    .checkout-btn:hover {
      background: #f5e7c8;
      box-shadow: 0 0 20px #d4af37;
    }

    /* overlay saat sidebar terbuka */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 9999;
      display: none;
    }

    .overlay.active {
      display: block;
    }

    /* login modal sederhana */
    .login-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(18, 14, 12, 0.95);
      backdrop-filter: blur(20px);
      border: 2px solid #d4af37;
      border-radius: 2.5rem;
      padding: 2.5rem;
      z-index: 10001;
      width: 90%;
      max-width: 400px;
      display: none;
      flex-direction: column;
      gap: 1.5rem;
      color: #f5e7c8;
      box-shadow: 0 0 50px #d4af37;
    }

    .login-modal.active {
      display: flex;
    }

    .login-modal h2 {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      text-align: center;
    }

    .login-modal input {
      background: rgba(255,255,255,0.05);
      border: 1px solid #d4af37;
      border-radius: 3rem;
      padding: 1rem 1.5rem;
      color: #f5e7c8;
      font-size: 1rem;
    }

    .login-modal input:focus {
      outline: none;
      box-shadow: 0 0 15px #d4af37;
    }

    .login-modal button {
      background: #d4af37;
      border: none;
      border-radius: 3rem;
      padding: 1rem;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-modal button:hover {
      background: #f5e7c8;
    }

    .close-login {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 2rem;
      color: #d4af37;
      cursor: pointer;
    }

    .signature {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #a48e78;
      letter-spacing: 2px;
    }
    .signature i {
      color: #d4af37;
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar Keranjang -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2><i class="fas fa-shopping-bag" style="margin-right: 10px;"></i>Keranjang</h2>
      <button class="close-cart" id="closeCartBtn">&times;</button>
    </div>
    <div class="cart-items" id="cartItemsContainer">
      <!-- akan diisi JS -->
    </div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span>Total</span>
        <span id="sidebarTotal">$0</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-lock"></i> Lanjut ke Pembayaran</button>
    </div>
  </div>

  <!-- Modal Login Sederhana -->
  <div class="login-modal" id="loginModal">
    <span class="close-login" id="closeLoginBtn">&times;</span>
    <h2>Login ke Akun Mewah</h2>
    <input type="text" id="loginUsername" placeholder="Nama pengguna" value="">
    <input type="password" id="loginPassword" placeholder="Password (bebas)" value="">
    <button id="loginSubmitBtn">Masuk</button>
    <p style="text-align: center; color:#bcb0a0;">Gunakan user: password bebas</p>
  </div>

  <div class="container">
    <div class="header">
      <div class="title-group">
        <h1>LA BELLE ASSIETTE</h1>
        <p><i class="fas fa-star" style="color:#d4af37;"></i> ART DE LA TABLE  <i class="fas fa-star" style="color:#d4af37;"></i></p>
      </div>
      <div class="actions">
        <!-- area login / user -->
        <div id="userSection">
          <button class="login-btn" id="showLoginBtn"><i class="fas fa-user-circle"></i> Login</button>
        </div>
        <!-- cart icon -->
        <div class="cart-icon" id="cartIcon">
          <i class="fas fa-shopping-bag"></i>
          <div class="cart-details">
            <span>Keranjang</span>
            <span class="cart-total" id="cartTotal">0 item • $0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- search -->
    <div class="search-section">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="Cari hidangan mewah...">
      </div>
    </div>

    <!-- grid makanan -->
    <div id="foodGrid" class="food-grid"></div>

    <!-- pagination -->
    <div class="pagination-container">
      <div class="prev-next" id="prevPage"><i class="fas fa-chevron-left"></i> Sebelum</div>
      <div id="paginationNumbers" class="pagination"></div>
      <div class="prev-next" id="nextPage">Berikut <i class="fas fa-chevron-right"></i></div>
    </div>

    <div class="signature">
      <i class="fas fa-utensils"></i>  ·  menu degustasi  ·  <i class="fas fa-wine-glass-alt"></i>
    </div>
  </div>

  <script>
    (function() {
      // ---------- DATA MAKANAN ----------
      const foods = [
        { name: "Truffle Pizza", desc: "Mozzarella fior di latte, truffle hitam, jamur porcini, minyak truffle", price: 24, image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400&h=300&fit=crop" },
        { name: "Wagyu Burger", desc: "Patty wagyu A5, keju cheddar tua, karamel bawang, saus truffle", price: 32, image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&h=300&fit=crop" },
        { name: "Lobster Pasta", desc: "Homemade tagliolini, lobster merah, cherry tomato, basil lemon", price: 45, image: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400&h=300&fit=crop" },
        { name: "Sushi Platter", desc: "20 pcs omakase: toro, salmon, uni, scallop, tamago truffle", price: 38, image: "https://images.unsplash.com/photo-1553621042-f6e147245754?w=400&h=300&fit=crop" },
        { name: "Grilled Steak", desc: "Dry aged ribeye 300gr, chimichurri, sayuran panggang, jus red wine", price: 55, image: "https://images.unsplash.com/photo-1546964124-0cce460f38ef?w=400&h=300&fit=crop" },
        { name: "Caesar Salad", desc: "Romaine segar, dressing caesar truffle, parmesan, crouton roti sourdough", price: 18, image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&h=300&fit=crop" },
        { name: "Chocolate Lava", desc: "Dark chocolate 70% dengan heart ganache, es krim vanilla bourbon", price: 14, image: "https://images.unsplash.com/photo-1551024506-0bccd828d307?w=400&h=300&fit=crop" },
        { name: "Seafood Paella", desc: "Nasi bomba, udang merah, kerang, cumi, saus safron & aioli", price: 42, image: "https://images.unsplash.com/photo-1559734940-9300b9f868b9?w=400&h=300&fit=crop" },
        { name: "Duck Confit", desc: "Paha bebek konfit, kentang salisbury, saus jeruk darah & madu", price: 48, image: "https://images.unsplash.com/photo-1600891964599-f61ba0e24092?w=400&h=300&fit=crop" },
        { name: "Margherita Pizza", desc: "San Marzano, mozzarella di bufala, basil segar, evoo", price: 22, image: "https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=400&h=300&fit=crop" },
        { name: "Carbonara", desc: "Spaghetti, guanciale, pecorino, kuning telur, lada hitam", price: 26, image: "https://images.unsplash.com/photo-1612874742237-6526221588e3?w=400&h=300&fit=crop" },
        { name: "Tuna Tartare", desc: "Tuna grade 1, alpukat, ponzu, minyak wijen, keripik wonton", price: 29, image: "https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?w=400&h=300&fit=crop" },
        { name: "Lamb Chops", desc: "Loin domba panggang, rosemary, kentang gratin, saus mint", price: 52, image: "https://images.unsplash.com/photo-1544025162-d76694265947?w=400&h=300&fit=crop" },
        { name: "Tiramisu", desc: "Mascarpone, kopi espresso, lady finger, cacao bubuk", price: 16, image: "https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=400&h=300&fit=crop" },
        { name: "Crab Cake", desc: "Lumpang kepiting, rempah old bay, saus lemon caper", price: 27, image: "https://images.unsplash.com/photo-1559734940-9300b9f868b9?w=400&h=300&fit=crop" },
        { name: "Foie Gras", desc: "Foie gras panggang, brioche, chutney mangga, kacang pistachio", price: 75, image: "https://images.unsplash.com/photo-1476224203421-9ac39bcb3327?w=400&h=300&fit=crop" },
        { name: "Lobster Bisque", desc: "Bisque lobster kental, brandy, crème fraîche, daging claw", price: 39, image: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&h=300&fit=crop" },
        { name: "Beef Wellington", desc: "Tenderloin, duxelles, prosciutto, puff pastry, sauce périgueux", price: 89, image: "https://images.unsplash.com/photo-1558030006-4506753939b9?w=400&h=300&fit=crop" },
        { name: "Crème Brûlée", desc: "Vanilla madagascar, lapisan karamel renyah, buah beri", price: 15, image: "https://images.unsplash.com/photo-1470124182917-cc6e71b22ecc?w=400&h=300&fit=crop" },
        { name: "Octopus Carpaccio", desc: "Irisan tipis gurita, olive oil, lemon, peterseli, caper", price: 41, image: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400&h=300&fit=crop" }
      ];

      // ---------- STATE ----------
      let cart = []; // item { name, price, quantity, image }
      let currentPage = 1;
      const itemsPerPage = 4;
      let filteredFoods = [...foods];
      let loggedInUser = null; // null atau string nama

      // DOM elements
      const foodGrid = document.getElementById('foodGrid');
      const prevBtn = document.getElementById('prevPage');
      const nextBtn = document.getElementById('nextPage');
      const paginationNumbers = document.getElementById('paginationNumbers');
      const searchInput = document.getElementById('searchInput');
      const cartTotalSpan = document.getElementById('cartTotal');
      const toastContainer = document.getElementById('toastContainer');
      const cartSidebar = document.getElementById('cartSidebar');
      const closeCartBtn = document.getElementById('closeCartBtn');
      const cartIcon = document.getElementById('cartIcon');
      const overlay = document.getElementById('overlay');
      const cartItemsContainer = document.getElementById('cartItemsContainer');
      const sidebarTotal = document.getElementById('sidebarTotal');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const userSection = document.getElementById('userSection');
      const showLoginBtn = document.getElementById('showLoginBtn');
      const loginModal = document.getElementById('loginModal');
      const closeLoginBtn = document.getElementById('closeLoginBtn');
      const loginSubmitBtn = document.getElementById('loginSubmitBtn');
      const loginUsername = document.getElementById('loginUsername');
      const loginPassword = document.getElementById('loginPassword');

      // ---------- HELPER ----------
      function getTotalPages() {
        return Math.ceil(filteredFoods.length / itemsPerPage);
      }

      // ---------- TOAST ----------
      function showToast(message, icon = 'fa-check-circle') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
        toastContainer.appendChild(toast);
        setTimeout(() => {
          if (toast.parentNode) toast.remove();
        }, 3000);
      }

      // ---------- CART OPERATIONS ----------
      function addToCart(food) {
        const existing = cart.find(item => item.name === food.name);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ 
            name: food.name, 
            price: food.price, 
            quantity: 1,
            image: food.image
          });
        }
        updateCartDisplay();
        saveCart();
        renderCartSidebar();
        showToast(`<strong>${food.name}</strong> ditambahkan`, 'fa-shopping-bag');
      }

      function removeFromCart(name) {
        cart = cart.filter(item => item.name !== name);
        updateCartDisplay();
        saveCart();
        renderCartSidebar();
        showToast(`Item dihapus`, 'fa-trash');
      }

      function updateQuantity(name, delta) {
        const item = cart.find(i => i.name === name);
        if (item) {
          item.quantity += delta;
          if (item.quantity <= 0) {
            removeFromCart(name);
          } else {
            updateCartDisplay();
            saveCart();
            renderCartSidebar();
          }
        }
      }

      function updateCartDisplay() {
        const totalItems = cart.reduce((acc, i) => acc + i.quantity, 0);
        const totalPrice = cart.reduce((acc, i) => acc + (i.price * i.quantity), 0);
        cartTotalSpan.innerText = `${totalItems} item • $${totalPrice}`;
      }

      function saveCart() {
        // bisa disimpan di localStorage jika ingin, tapi untuk demo tidak perlu
      }

      // render isi sidebar
      function renderCartSidebar() {
        if (!cartItemsContainer) return;
        if (cart.length === 0) {
          cartItemsContainer.innerHTML = `<div style="text-align:center; color:#bcb0a0; padding:2rem;">Keranjang kosong, silakan pesan hidangan mewah.</div>`;
          sidebarTotal.innerText = `$0`;
          return;
        }
        let html = '';
        let total = 0;
        cart.forEach(item => {
          total += item.price * item.quantity;
          html += `
            <div class="cart-item">
              <img src="${item.image}" alt="${item.name}" class="cart-item-img">
              <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">$${item.price}</div>
                <div class="cart-item-actions">
                  <div class="cart-item-qty">
                    <button class="qty-btn" data-name="${item.name}" data-delta="-1">−</button>
                    <span>${item.quantity}</span>
                    <button class="qty-btn" data-name="${item.name}" data-delta="1">+</button>
                  </div>
                  <button class="remove-item" data-name="${item.name}"><i class="fas fa-times-circle"></i></button>
                </div>
              </div>
            </div>
          `;
        });
        cartItemsContainer.innerHTML = html;
        sidebarTotal.innerText = `$${total}`;

        // event listeners untuk tombol di sidebar
        cartItemsContainer.querySelectorAll('.qty-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const name = e.currentTarget.dataset.name;
            const delta = parseInt(e.currentTarget.dataset.delta);
            updateQuantity(name, delta);
          });
        });
        cartItemsContainer.querySelectorAll('.remove-item').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const name = e.currentTarget.dataset.name;
            removeFromCart(name);
          });
        });
      }

      // ---------- LOGIN ----------
      function login(username) {
        loggedInUser = username;
        updateUserSection();
        showToast(`Selamat datang, ${username}!`, 'fa-door-open');
        loginModal.classList.remove('active');
        overlay.classList.remove('active'); // tutup overlay jika ada
      }

      function logout() {
        loggedInUser = null;
        updateUserSection();
        showToast('Anda telah logout', 'fa-sign-out-alt');
      }

      function updateUserSection() {
        if (loggedInUser) {
          userSection.innerHTML = `<div class="user-greeting"><i class="fas fa-user-check"></i> Halo, ${loggedInUser}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
          document.getElementById('logoutBtn')?.addEventListener('click', logout);
        } else {
          userSection.innerHTML = `<button class="login-btn" id="showLoginBtn"><i class="fas fa-user-circle"></i> Login</button>`;
          document.getElementById('showLoginBtn')?.addEventListener('click', () => {
            loginModal.classList.add('active');
            overlay.classList.add('active');
          });
        }
      }

      // ---------- RENDER MAKANAN ----------
      function displayFoods() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filteredFoods.slice(start, end);

        if (pageItems.length === 0 && filteredFoods.length > 0) {
          currentPage = 1;
          return displayFoods();
        }

        let html = '';
        pageItems.forEach(item => {
          html += `
            <div class="food-card">
              <img src="${item.image}" alt="${item.name}" class="food-img" loading="lazy">
              <div class="food-info">
                <div class="food-name">${item.name} <i class="fas fa-crown"></i></div>
                <div class="food-desc">${item.desc}</div>
                <div class="food-footer">
                  <span class="food-price"><small>$</small>${item.price}</span>
                  <button class="btn-order" data-name="${item.name}" data-price="${item.price}" data-desc="${item.desc}" data-image="${item.image}">Pesan <i class="fas fa-arrow-right"></i></button>
                </div>
              </div>
            </div>
          `;
        });
        foodGrid.innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:3rem;">Tidak ada hidangan</div>';
      }

      function renderPagination() {
        const totalPages = getTotalPages();
        let buttons = '';
        for (let i = 1; i <= totalPages; i++) {
          buttons += `<div class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</div>`;
        }
        paginationNumbers.innerHTML = buttons;
        document.querySelectorAll('.page-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const page = parseInt(e.currentTarget.dataset.page);
            if (page !== currentPage) {
              currentPage = page;
              displayFoods();
              renderPagination();
              updatePrevNext();
            }
          });
        });
        updatePrevNext();
      }

      function updatePrevNext() {
        const total = getTotalPages();
        prevBtn.classList.toggle('disabled', currentPage === 1);
        nextBtn.classList.toggle('disabled', currentPage === total || total === 0);
      }

      // ---------- FILTER ----------
      function filterFoods() {
        const query = searchInput.value.trim().toLowerCase();
        filteredFoods = query ? foods.filter(f => f.name.toLowerCase().includes(query) || f.desc.toLowerCase().includes(query)) : [...foods];
        currentPage = 1;
        displayFoods();
        renderPagination();
      }

      // ---------- EVENT LISTENERS ----------
      // pagination
      prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          displayFoods();
          renderPagination();
        }
      });
      nextBtn.addEventListener('click', () => {
        if (currentPage < getTotalPages()) {
          currentPage++;
          displayFoods();
          renderPagination();
        }
      });

      // search
      searchInput.addEventListener('input', filterFoods);

      // tambah ke keranjang via grid
      foodGrid.addEventListener('click', (e) => {
        const btn = e.target.closest('.btn-order');
        if (btn) {
          const name = btn.dataset.name;
          const price = parseFloat(btn.dataset.price);
          const image = btn.dataset.image;
          addToCart({ name, price, image });
        }
      });

      // buka/tutup sidebar keranjang
      cartIcon.addEventListener('click', () => {
        cartSidebar.classList.add('open');
        overlay.classList.add('active');
        renderCartSidebar();
      });
      closeCartBtn.addEventListener('click', () => {
        cartSidebar.classList.remove('open');
        overlay.classList.remove('active');
      });
      overlay.addEventListener('click', () => {
        cartSidebar.classList.remove('open');
        loginModal.classList.remove('active');
        overlay.classList.remove('active');
      });

      // login modal
      showLoginBtn.addEventListener('click', () => {
        loginModal.classList.add('active');
        overlay.classList.add('active');
      });
      closeLoginBtn.addEventListener('click', () => {
        loginModal.classList.remove('active');
        overlay.classList.remove('active');
      });
      loginSubmitBtn.addEventListener('click', () => {
        const user = loginUsername.value.trim();
        if (user) {
          login(user);
        } else {
          showToast('Masukkan nama', 'fa-exclamation-circle');
        }
      });

      // checkout (simulasi)
      checkoutBtn.addEventListener('click', () => {
        if (!loggedInUser) {
          showToast('Silakan login terlebih dahulu', 'fa-exclamation-circle');
          loginModal.classList.add('active');
          overlay.classList.add('active');
          return;
        }
        if (cart.length === 0) {
          showToast('Keranjang kosong', 'fa-shopping-bag');
          return;
        }
        showToast('Terima kasih! Pesanan Anda diproses (demo)', 'fa-check-circle');
        cart = [];
        updateCartDisplay();
        renderCartSidebar();
        cartSidebar.classList.remove('open');
        overlay.classList.remove('active');
      });

      // inisialisasi
      displayFoods();
      renderPagination();
      updateUserSection();
      updateCartDisplay();
      renderCartSidebar();

      // sambutan
      setTimeout(() => showToast('✨ Selamat datang di La Belle Assiette', 'fa-star'), 500);
    })();
  </script>
</body>
</html>
